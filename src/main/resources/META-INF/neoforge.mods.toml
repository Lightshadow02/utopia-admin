modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/utopia/utopia/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Utopia"
description='''
Pack de plugins serveur "essentials" pour NeoForge ${minecraft_version}.
Inclut: recompenses quotidiennes (/daily) parametrables avec systeme de serie (streak),
demandes de teleportation entre joueurs (/tpa, /tpahere, /tpaccept, /tpadeny),
et la gestion du spawn (/spawn, /setspawn).
'''

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
